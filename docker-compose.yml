version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: credit-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: subscription_credit_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: credit-backend
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/subscription_credit_db?schema=public
      JWT_SECRET: secret_key
    ports:
      - "3000:3000"
    command: sh -c "npx prisma db push && npx prisma db seed && npm run start"

  frontend:
    build: ./frontend
    container_name: credit-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data: